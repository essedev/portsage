name: ci

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-tests:
    name: Rust tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            cargo-flags: ""
            needs-cli-sidecar: true
          # The Linux runner builds with `--no-default-features` so the
          # workspace skips the Tauri toolchain (which would need GTK +
          # webkit2gtk system packages just to compile).
          - os: ubuntu-latest
            cargo-flags: "--no-default-features"
            needs-cli-sidecar: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # actions-rust-lang installs the toolchain and rewrites the cargo/rustc
      # shims so they always proxy to the active toolchain - dtolnay's variant
      # left stale shims when combined with a restored rust-cache, surfacing
      # as `cargo build` invoking `rustup-init` instead of cargo proper.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy
          # Don't treat warnings as errors: the codebase intentionally retains
          # several APIs (forwards.rs forward management, BackendClient helpers)
          # that aren't reachable from every build profile. Clippy still runs as
          # its own step below and gates real lint regressions.
          rustflags: ""

      # The Tauri build.rs reads tauri.conf.json's `externalBin` section and
      # fails if the staged sidecar binary is missing - even for `cargo test`.
      # Stage it before invoking cargo on the GUI lane. The Linux lane builds
      # without the `gui` feature so tauri-build is skipped entirely.
      - name: Stage portsage-cli sidecar (GUI lane only)
        if: matrix.needs-cli-sidecar
        run: bash scripts/build-cli.sh

      # The macOS lane builds the full Tauri app and runs its tests. The Linux
      # lane builds only the headless server crates plus portsage-client and
      # portsage-cli - it is the regression net for the Linux server target.
      - name: cargo test
        run: cargo test --workspace ${{ matrix.cargo-flags }}

      - name: cargo clippy
        run: cargo clippy --workspace ${{ matrix.cargo-flags }} --all-targets

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: pnpm test
        run: pnpm test
