name: server-build

# Build the Linux headless server (`portsage-server`) and the CLI as a single
# statically-linked tarball. Triggered by tag pushes (so a release picks up the
# binary automatically) and manual dispatch (for ad-hoc dev artifacts).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# `softprops/action-gh-release` needs write access to the repo's releases
# resource. Without this the action fails with a 403 "Resource not accessible
# by integration" when the workflow is triggered by a tag push. Default
# GITHUB_TOKEN scope dropped contents:write in 2023, so we have to ask for it.
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  linux-x86_64:
    name: Linux x86_64 (musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2

      # musl-tools provides the linker (`musl-gcc`) needed to produce a fully
      # static binary that runs on any glibc-era distro without pulling in
      # libc symbols.
      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # Headless server: same `portsage` crate, but `--no-default-features`
      # drops the Tauri runtime entirely. The output binary is the same one
      # macOS uses when launched with `--headless`.
      - name: Build portsage-server
        run: |
          cargo build --release \
            --no-default-features \
            --target x86_64-unknown-linux-musl \
            -p portsage

      - name: Build portsage CLI
        run: |
          cargo build --release \
            --target x86_64-unknown-linux-musl \
            -p portsage-cli

      - name: Stage artifact
        run: |
          mkdir -p staging/portsage-server-linux-x86_64
          cp target/x86_64-unknown-linux-musl/release/portsage \
             staging/portsage-server-linux-x86_64/portsage-server
          cp target/x86_64-unknown-linux-musl/release/portsage-cli \
             staging/portsage-server-linux-x86_64/portsage
          cp packaging/linux/portsage-server.service staging/portsage-server-linux-x86_64/
          cp packaging/linux/install.sh staging/portsage-server-linux-x86_64/
          cp packaging/linux/README.md staging/portsage-server-linux-x86_64/
          chmod +x staging/portsage-server-linux-x86_64/install.sh

      - name: Create tarball
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          if [ "$VERSION" = "$GITHUB_REF" ]; then
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          tar -C staging -czf "portsage-server-${VERSION}-linux-x86_64.tar.gz" \
            portsage-server-linux-x86_64
          echo "ARCHIVE=portsage-server-${VERSION}-linux-x86_64.tar.gz" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: portsage-server-linux-x86_64
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
